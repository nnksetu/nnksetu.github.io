name: 批量替换页脚链接 (通用版)

on:
  workflow_dispatch: 

# 添加以下权限声明，允许 Actions 写入仓库
permissions:
  contents: write

jobs:
  replace-text:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python 环境
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: 执行批量替换
        run: |
          python -c '
          import os
          import re

          target_dirs = ["setu", "zrsetu"]
          # 使用更宽松的正则，兼容不同 QQ 和可能的换行符
          pattern = re.compile(r"<div class=\"fixed-button\">.*?<a href=\"https://qm\.qq\.com/.*?</div>", re.DOTALL)
          
          new_snippet = "<div class=\"fixed-button\"><a href=\"https://setutime.com\">SetuTime 合集</a>\n</div>"

          count = 0
          for d in target_dirs:
              if not os.path.exists(d): continue
              for root, _, files in os.walk(d):
                  for file in files:
                      if file.endswith(".html"):
                          path = os.path.join(root, file)
                          with open(path, "r", encoding="utf-8") as f:
                              content = f.read()
                          
                          if pattern.search(content):
                              new_content = pattern.sub(new_snippet, content)
                              with open(path, "w", encoding="utf-8") as f:
                                  f.write(new_content)
                              print(f"已处理: {path}")
                              count += 1
          print(f"任务完成，共更新了 {count} 个文件")
          '

      - name: 提交并推送更改
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add .
          # 如果没有更改则不报错
          git diff --quiet && git diff --staged --quiet || (git commit -m "自动更新页脚：清理所有旧版 QQ 按钮" && git push)
