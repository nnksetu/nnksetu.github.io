name: 批量替换页脚链接 (通用版)

on:
  workflow_dispatch: # 手动触发执行

jobs:
  replace-text:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python 环境
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: 执行批量替换
        run: |
          python -c '
          import os
          import re

          # 目标文件夹
          target_dirs = ["setu", "zrsetu"]
          
          # 通用正则：匹配所有包含 qm.qq.com 的 fixed-button 块
          # 它会匹配任何 QQ 链接和任何 QQ 号码文字
          pattern = re.compile(r"<div class=\"fixed-button\"><a href=\"https://qm\.qq\.com/[^\"]+\" target=\"_blank\">qq：\d+ 添加好友获取更新</a>\s*</div>", re.DOTALL)
          
          # 新的统一按钮代码
          new_snippet = "<div class=\"fixed-button\"><a href=\"https://setutime.com\">SetuTime 合集</a>\n</div>"

          count = 0
          for d in target_dirs:
              if not os.path.exists(d): continue
              for root, _, files in os.walk(d):
                  for file in files:
                      if file.endswith(".html"):
                          path = os.path.join(root, file)
                          with open(path, "r", encoding="utf-8") as f:
                              content = f.read()
                          
                          if pattern.search(content):
                              # 使用正则进行无差别替换
                              new_content = pattern.sub(new_snippet, content)
                              with open(path, "w", encoding="utf-8") as f:
                                  f.write(new_content)
                              print(f"已处理: {path}")
                              count += 1
          print(f"任务完成，共更新了 {count} 个文件")
          '

      - name: 提交并推送更改
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add .
          git commit -m "自动更新页脚：清理所有旧版 QQ 按钮" || echo "没有检测到更改"
          git push
