<script>
const rootUrl = './'; [cite: 34]
const ITEMS_PER_PAGE = 10; [cite: 35]
const header = document.getElementById('header'); [cite: 35]
let lastScrollY = 0; [cite: 35]
let ticking = false; [cite: 35]
let allZrsetuItems = []; [cite: 35]

function updateHeader() {
  const currentScrollY = window.scrollY; [cite: 36]
  if (currentScrollY > lastScrollY && currentScrollY > 10) {
    header.classList.add('hidden'); [cite: 36]
  } else if (currentScrollY < lastScrollY || currentScrollY <= 10) {
    header.classList.remove('hidden'); [cite: 37]
  }
  lastScrollY = currentScrollY; [cite: 37]
  ticking = false; [cite: 37]
}

window.addEventListener('scroll', () => {
  if (!ticking) { window.requestAnimationFrame(updateHeader); ticking = true; } [cite: 38]
}, { passive: true }); // 增加 passive 优化移动端滚动性能

async function loadData() {
  try {
    const res = await fetch(`${rootUrl}data.json?t=${Date.now()}`); [cite: 39]
    if (!res.ok) throw new Error('Failed'); [cite: 39]
    return await res.json(); [cite: 40]
  } catch (e) {
    document.body.innerHTML = '<div style="text-align:center;margin-top:8rem;color:#e74c3c;">加载失败，请刷新重试</div>'; [cite: 40]
    throw e; [cite: 40]
  }
}

// 优化后的分页渲染逻辑（不改变DOM结构与UI，仅改为文档片段批量处理）
function renderPage(items, containerId, paginationId, page = 1) {
  const container = document.getElementById(containerId); [cite: 41]
  const pagination = document.getElementById(paginationId); [cite: 41]
  const totalPages = Math.ceil(items.length / ITEMS_PER_PAGE); [cite: 42]
  const start = (page - 1) * ITEMS_PER_PAGE; [cite: 42]
  const pageItems = items.slice(start, start + ITEMS_PER_PAGE); [cite: 43]

  container.innerHTML = ''; [cite: 43]
  
  // 使用 Fragment 容器减少回流
  const fragment = document.createDocumentFragment();
  
  pageItems.forEach(item => {
    const li = document.createElement('li'); [cite: 44]
    const num = item.file.match(/\d+/)?.[0] || '?'; [cite: 44]
    li.innerHTML = `<span class="num">第${num}期</span>${item.caption ? `<span class="caption">${item.caption}</span>` : ''}`; [cite: 44]
    li.onclick = () => window.location.href = `${rootUrl}${containerId === 'setu-list' ? 'setu' : 'zrsetu'}/${item.file}`; [cite: 44]
    fragment.appendChild(li);
  });
  container.appendChild(fragment); [cite: 44]

  pagination.innerHTML = ''; [cite: 45]
  const prev = document.createElement('button'); [cite: 45]
  prev.textContent = '←'; [cite: 45]
  prev.disabled = page === 1; [cite: 45]
  prev.onclick = () => page > 1 && renderPage(items, containerId, paginationId, page - 1); [cite: 46]
  pagination.appendChild(prev); [cite: 46]

  const maxBtns = 5; [cite: 46]
  let startPage = Math.max(1, page - 2); [cite: 47]
  let endPage = Math.min(totalPages, startPage + maxBtns - 1); [cite: 47]
  if (endPage - startPage + 1 < maxBtns) startPage = Math.max(1, endPage - maxBtns + 1); [cite: 48]
  
  const pgFragment = document.createDocumentFragment();
  for (let i = startPage; i <= endPage; i++) {
    const btn = document.createElement('button'); [cite: 49]
    btn.textContent = i; [cite: 49]
    if (i === page) btn.classList.add('active'); [cite: 50]
    btn.onclick = () => renderPage(items, containerId, paginationId, i); [cite: 50]
    pgFragment.appendChild(btn);
  }
  pagination.appendChild(pgFragment);

  const next = document.createElement('button'); [cite: 50]
  next.textContent = '→'; [cite: 51]
  next.disabled = page === totalPages; [cite: 51]
  next.onclick = () => page < totalPages && renderPage(items, containerId, paginationId, page + 1); [cite: 51]
  pagination.appendChild(next); [cite: 52]
}

function toggleSearch(show) {
  const overlay = document.getElementById('searchOverlay'); [cite: 52]
  const input = document.getElementById('searchInput'); [cite: 52]
  if (show) {
    overlay.style.display = 'flex'; [cite: 53]
    window.requestAnimationFrame(() => overlay.classList.add('active')); [cite: 53]
    input.focus(); [cite: 53]
  } else {
    overlay.classList.add('closing'); [cite: 54]
    setTimeout(() => {
      overlay.classList.remove('active', 'closing'); [cite: 54]
      overlay.style.display = 'none'; [cite: 54]
      input.value = ''; [cite: 54]
      document.getElementById('searchResults').innerHTML = ''; [cite: 54]
    }, 110); [cite: 54]
  }
}

// 简单的防抖函数，避免连续输入时卡顿
function debounce(fn, delay) {
  let timer = null;
  return function(...args) {
    if (timer) clearTimeout(timer);
    timer = setTimeout(() => fn.apply(this, args), delay);
  };
}

// 优化后的搜索事件，加入 150ms 防抖
document.getElementById('searchInput').oninput = debounce(function(e) {
  const val = e.target.value.toLowerCase().trim(); [cite: 55]
  const resultsDiv = document.getElementById('searchResults'); [cite: 55]
  if (!val) { resultsDiv.innerHTML = ''; return; } [cite: 55, 56]
  
  const matched = allZrsetuItems.filter(item => item.caption && item.caption.toLowerCase().includes(val)); [cite: 56]
  resultsDiv.innerHTML = matched.map(item => `
    <div class="item" onclick="window.open('${rootUrl}zrsetu/${item.file}', '_blank')">
      <div class="title">第${item.file.match(/\d+/)?.[0] || '?'}期</div>
      <div class="sub">${item.caption}</div>
    </div>
  `).join(''); [cite: 57]
}, 150);

window.onkeydown = (e) => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'k') { e.preventDefault(); toggleSearch(true); } [cite: 58, 59]
  if (e.key === 'Escape') toggleSearch(false); [cite: 59]
};

window.onload = async () => {
  const data = await loadData(); [cite: 59]
  if (data.updated) document.getElementById('update-time').textContent = `最后更新：${data.updated}`; [cite: 60]
  const sortDesc = arr => arr.sort((a,b) => (parseInt(b.file)||0) - (parseInt(a.file)||0)); [cite: 60]
  const setuItems = sortDesc(data.setu || []); [cite: 61]
  allZrsetuItems = sortDesc(data.zrsetu || []); [cite: 61]
  
  renderPage(setuItems, 'setu-list', 'setu-pagination', 1); [cite: 61]
  renderPage(allZrsetuItems, 'zrsetu-list', 'zrsetu-pagination', 1); [cite: 61]
  document.getElementById('page-info').innerHTML = `二次元 <b>${setuItems.length}</b> 期　　Cos写真 <b>${allZrsetuItems.length}</b> 期`; [cite: 62]
  document.body.classList.add('loaded'); [cite: 62]
};
</script>
