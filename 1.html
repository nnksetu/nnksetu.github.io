<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>URL 转 HTML 生成器</title>
<style>
    body { font-family: Arial, sans-serif; padding: 20px; max-width: 800px; margin: auto; }
    textarea { width: 100%; height: 200px; margin-bottom: 10px; font-size: 14px; border: 1px solid #ccc; border-radius: 4px; padding: 8px; }
    button { padding: 10px 15px; margin-right: 10px; cursor: pointer; background-color: #f0f0f0; border: 1px solid #bbb; border-radius: 4px; }
    button:hover { background-color: #e0e0e0; }
    #output { width: 100%; height: 250px; margin-top: 10px; font-size: 14px; }
    .section { margin-top: 40px; padding-top: 20px; border-top: 2px solid #eee; }
    input[type="text"], input[type="number"] { padding: 8px; margin: 8px 0; border: 1px solid #ccc; border-radius: 4px; }
    input[type="text"] { width: 280px; }
    input[type="number"] { width: 80px; }
    label { display: inline-block; min-width: 110px; margin: 8px 0; }
</style>
</head>
<body>

<h2>URL 转 HTML 代码生成器</h2>
<p>在下面输入每行一个链接：</p>
<textarea id="inputUrls" placeholder="在这里粘贴URL，每行一个"></textarea>
<br>
<button onclick="generateHTML()">生成代码</button>
<button onclick="copyResult()">复制结果</button>
<button onclick="clearAll()">清空全部</button>
<textarea id="output" placeholder="生成的HTML代码会显示在这里"></textarea>

<div class="section">
<h2>批量生成视频链接</h2>
<p>固定域名：https://r2.setutime.com/zrsetu/</p>

<div>
    <label>期号：</label>
    <input type="text" id="videoIssue" onblur="saveSetting('videoIssue', this.value)" value="1">
</div>

<div>
    <label>生成数量：</label>
    <input type="number" id="videoCount" value="5" min="1" max="9999">
</div>

<div style="margin-top:15px;">
    <button onclick="generateVideoUrls()">生成链接</button>
    <button onclick="copyVideoResult()">复制结果</button>
    <button onclick="clearVideoBatch()">清空本区</button>
</div>

<textarea id="videoOutput" style="width: 100%; height: 250px; margin-top: 10px; font-size: 14px;" placeholder="批量生成的视频HTML代码会显示在这里"></textarea>
</div>

<div class="section">
<h2>批量生成图片链接（r2.setutime.com）</h2>
<p>固定域名：https://r2.setutime.com</p>

<div>
    <label>文件夹前缀：</label>
    <input type="text" id="prefix" value="zrsetu">
</div>

<div>
    <label>子目录/编号：</label>
    <input type="text" id="number" value="3">
</div>

<div>
    <label>文件名基础：</label>
    <input type="text" id="baseName" value="pic">
</div>

<div>
    <label>后缀：</label>
    <input type="text" id="suffix" value="webp">
</div>

<div>
    <label>生成数量：</label>
    <input type="number" id="count" value="80" min="1" max="9999">
</div>

<div style="margin-top:15px;">
    <button onclick="generateBatchUrls()">生成链接</button>
    <button onclick="copyBatchResult()">复制结果</button>
    <button onclick="clearBatch()">清空本区</button>
</div>

<textarea id="batchOutput" style="width: 100%; height: 250px; margin-top: 10px; font-size: 14px;" placeholder="批量生成的链接会显示在这里"></textarea>
</div>

<script>
// 页面加载时恢复记忆
window.onload = function() {
    if(localStorage.getItem("videoIssue")) {
        document.getElementById("videoIssue").value = localStorage.getItem("videoIssue");
    }
};

// 保存设置
function saveSetting(key, value) {
    localStorage.setItem(key, value);
}

// 1. 生成HTML功能
function generateHTML() {
    const input = document.getElementById("inputUrls").value.trim();
    if (!input) return;

    const urls = input.split("\n").map(u => u.trim()).filter(u => u !== "");
    const result = urls
        .map((url, index) => 
            `<div class="image-item"><div class="img-wrap"><img data-src="${url}" alt="${index + 1}"></div></div>`
        )
        .join("\n");

    document.getElementById("output").value = result;
}

// 视频生成功能
function generateVideoUrls() {
    const issue = document.getElementById("videoIssue").value.trim() || "1";
    saveSetting("videoIssue", issue); // 生成时自动保存
    const count = parseInt(document.getElementById("videoCount").value) || 10;

    if (count < 1 || count > 9999) return;

    const lines = [];
    for(let i = 1; i <= count; i++) {
        const item = `<div class="image-item">
  <video class="responsive-video" controls preload="metadata" playsinline webkit-playsinline>
    <source src="https://r2.setutime.com/zrsetu/video-${issue}-${i}.mp4#t=0.1" type="video/mp4">
  </video>
</div>`;
        lines.push(item);
    }
    document.getElementById("videoOutput").value = lines.join("\n");
}

// 图片生成功能
function generateBatchUrls() {
    const prefix = document.getElementById("prefix").value.trim() || "zrsetu";
    const number = document.getElementById("number").value.trim() || "1";
    const baseName = document.getElementById("baseName").value.trim() || "pic";
    const suffix = document.getElementById("suffix").value.trim() || "webp";
    const count = parseInt(document.getElementById("count").value) || 80;

    if (count < 1 || count > 9999) return;

    const lines = [];
    for(let i = 1; i <= count; i++) {
        const filename = `${baseName}-${i}.${suffix}`;
        const url = `https://r2.setutime.com/${prefix}/${number}/${filename}`;
        lines.push(url);
    }
    document.getElementById("batchOutput").value = lines.join("\n");
}

// 复制功能
function copyResult() { document.getElementById("output").select(); document.execCommand("copy"); }
function copyVideoResult() { document.getElementById("videoOutput").select(); document.execCommand("copy"); }
function copyBatchResult() { document.getElementById("batchOutput").select(); document.execCommand("copy"); }

// 清空功能
function clearAll() { document.getElementById("inputUrls").value = ""; document.getElementById("output").value = ""; }
function clearVideoBatch() { document.getElementById("videoIssue").value = "1"; localStorage.removeItem("videoIssue"); document.getElementById("videoCount").value = "5"; document.getElementById("videoOutput").value = ""; }
function clearBatch() { document.getElementById("prefix").value = "zrsetu"; document.getElementById("number").value = "3"; document.getElementById("baseName").value = "pic"; document.getElementById("suffix").value = "webp"; document.getElementById("count").value = "80"; document.getElementById("batchOutput").value = ""; }
</script>
</body>
</html>
